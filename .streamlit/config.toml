[client]
# "minimal" hides the Deploy button and most toolbar chrome.
toolbarMode = "minimal"

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false

[server]
headless = true
enableXsrfProtection = true

[theme]
# Force dark theme on Streamlit Cloud — prevents white-on-white text bugs.
base = "dark"
backgroundColor = "#090E1A"
secondaryBackgroundColor = "#0D1526"
primaryColor = "#7C6FFF"
textColor = "#E8F4FD"
font = "sans serif"
